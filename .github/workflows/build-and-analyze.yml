        with:
          dotnet-version: |
            10.0.x
      - name: Setup PostgreSQL
        run: |
          chmod +x tools/dev-setup/dbsetup.sh
          ./tools/dev-setup/dbsetup.sh
      - name: Restart database to enable config changes
        run: docker restart ${{ job.services.postgres.id }}
      - name: Run Tools tests
        run: |
          dotnet test tools/test/Altinn.Notifications.Tools.Tests/Altinn.Notifications.Tools.Tests.csproj \
          -v q \
          --collect:"XPlat Code Coverage" \
          --results-directory TestResults/tools/ \
          --logger "trx;LogFileName=tools.trx" \
          --configuration Release \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: test-results-tools
          path: TestResults/
      - name: Verify coverage files exist
        if: always()
        run: |
          if ! find TestResults -name "coverage.opencover.xml" | grep -q .; then
            echo "❌ ERROR: No coverage files produced!"
            echo "This usually means coverlet.collector is missing or coverage collection failed."
            exit 1
          fi
          echo "✅ Coverage files found:"
          find TestResults -name "coverage.opencover.xml" -exec echo "  {}" \;
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-tools
          path: '**/TestResults/**/coverage.opencover.xml'
      - name: Process test results
        if: always()
        uses: NasAmin/trx-parser@359b39f5319df4478443ef1f0eb952f159896995 # v0.7.0
        with:
          TRX_PATH: ${{ github.workspace }}/TestResults
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: SonarCloud Analysis
    needs: [changes, build, test-api, test-shared, test-sms, test-email, test-tools]
    if: always() && needs.build.result == 'success' && (
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.email == 'true' ||
      needs.changes.outputs.sms == 'true' ||
      needs.changes.outputs.tools == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - name: Download Shared coverage
        if: needs.test-shared.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-shared
          path: coverage/shared
        continue-on-error: true
      - name: Download API coverage
        if: needs.test-api.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-api
          path: coverage/api
        continue-on-error: true
      - name: Download SMS coverage
        if: needs.test-sms.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-sms
          path: coverage/sms
        continue-on-error: true
      - name: Download Email coverage
        if: needs.test-email.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-email
          path: coverage/email
        continue-on-error: true
      - name: Download Tools coverage
        if: needs.test-tools.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-tools
          path: coverage/tools
        continue-on-error: true
      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner
      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"Altinn_altinn-notifications" \
            /o:"altinn" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml" \
            /d:sonar.exclusions="components/api/src/Altinn.Notifications.Persistence/Migration/**/*"

          if [[ "${{ needs.changes.outputs.api }}" == "true" || "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            dotnet build components/api/Altinn.Notifications.API.slnx -c Release -v q
          fi

          if [[ "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            dotnet build components/shared/Altinn.Notifications.Shared.slnx -c Release -v q
          fi

          if [[ "${{ needs.changes.outputs.email }}" == "true" || "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            dotnet build components/email-service/Altinn.Notifications.Email.slnx -c Release -v q
          fi

          if [[ "${{ needs.changes.outputs.sms }}" == "true" || "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            dotnet build components/sms-service/Altinn.Notifications.Sms.slnx -c Release -v q
          fi

          if [[ "${{ needs.changes.outputs.tools }}" == "true" ]]; then
            dotnet build tools/Altinn.Notifications.Tools.slnx -c Release -v q
          fi

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  status-check:
    permissions:
      contents: read
    name: Status Check
    needs: [validate-solutions, build, test-api, test-shared, test-sms, test-email, test-tools, sonarcloud]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "### Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Solutions | ${{ needs.validate-solutions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test: Shared | ${{ needs.test-shared.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test: Notifications API | ${{ needs.test-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test: SMS Delivery Service | ${{ needs.test-sms.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test: Email Delivery Service | ${{ needs.test-email.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test: Tools | ${{ needs.test-tools.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud | ${{ needs.sonarcloud.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.validate-solutions.result }}" == "failure" ]]; then
            echo "❌ Solution validation failed"
            exit 1
          fi

          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          fi

          if [[ "${{ needs.test-shared.result }}" == "failure" ]]; then
            echo "❌ Shared tests failed"
            exit 1
          fi

          if [[ "${{ needs.test-api.result }}" == "failure" ]]; then
            echo "❌ API tests failed"
            exit 1
          fi

          if [[ "${{ needs.test-sms.result }}" == "failure" ]]; then
            echo "❌ SMS tests failed"
            exit 1
          fi

          if [[ "${{ needs.test-email.result }}" == "failure" ]]; then
            echo "❌ Email tests failed"
            exit 1
          fi

          if [[ "${{ needs.test-tools.result }}" == "failure" ]]; then
            echo "❌ Tools tests failed"
            exit 1
          fi

          echo "✅ All required checks passed"
