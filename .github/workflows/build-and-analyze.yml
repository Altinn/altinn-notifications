name: .NET Analysis

on:
  push:
    branches: [main]
    paths-ignore: &paths-ignore
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - '**/*.svg'
      - '**/*.png'
      - '.gitignore'
      - '.editorconfig'
      - 'renovate.json'
      - 'stylecop.json'
      - '.dockerignore'
      - '.gitattributes'
      - '.github/CODEOWNERS'
      - '.github/labeler.yml'
      - 'components/api/test/k6/**'
      - 'components/api/test/bruno/**'
      - '.github/workflows/pr-label-*.yml'
      - '.github/workflows/send-slack-warning.yml'
      - '.github/workflows/assign-issue-to-project.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore: *paths-ignore
  workflow_dispatch:

concurrency:
  group: dotnet-analysis-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-solutions:
    name: Validate Solution Structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.0.x
      - name: Validate all solutions
        run: |
          echo "Validating solution files..."
          for sln in $(find . -name "*.slnx" -type f); do
            echo "Checking: $sln"
            dotnet sln "$sln" list || { echo "❌ Invalid solution: $sln"; exit 1; }
          done
          echo "✅ All solutions valid"

  changes:
    name: Detect changes
    needs: validate-solutions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      sms: ${{ steps.filter.outputs.sms }}
      email: ${{ steps.filter.outputs.email }}
      tools: ${{ steps.filter.outputs.tools }}
      shared: ${{ steps.filter.outputs.shared }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            api:
              - 'global.json'
              - 'components/api/src/**'
              - 'components/api/Altinn.Notifications.API.slnx'
              - 'components/api/test/Altinn.Notifications.Tests/**'
              - 'components/api/test/Altinn.Notifications.IntegrationTests/**'
              - 'components/api/test/Altinn.Notifications.IntegrationTestsASB/**'
            shared:
              - 'global.json'
              - 'components/shared/src/**'
              - 'components/shared/test/**'
              - 'components/shared/Altinn.Notifications.Shared.slnx'
            sms:
              - 'global.json'
              - 'components/sms-service/src/**'
              - 'components/sms-service/test/**'
              - 'components/sms-service/Altinn.Notifications.Sms.slnx'
            email:
              - 'global.json'
              - 'components/email-service/src/**'
              - 'components/email-service/test/**'
              - 'components/email-service/Altinn.Notifications.Email.slnx'
            tools:
              - 'global.json'
              - 'tools/src/**'
              - 'tools/test/**'
              - 'tools/Altinn.Notifications.Tools.slnx'
      - name: Build dynamic matrix
        id: set-matrix
        run: |
          matrix='{"include":['

          if [[ "${{ steps.filter.outputs.api }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix+='{"component":"api","solution":"components/api/Altinn.Notifications.API.slnx"},'
          fi

          if [[ "${{ steps.filter.outputs.shared }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix+='{"component":"shared","solution":"components/shared/Altinn.Notifications.Shared.slnx"},'
          fi

          if [[ "${{ steps.filter.outputs.email }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix+='{"component":"email","solution":"components/email-service/Altinn.Notifications.Email.slnx"},'
          fi

          if [[ "${{ steps.filter.outputs.sms }}" == "true" || "${{ steps.filter.outputs.shared }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix+='{"component":"sms","solution":"components/sms-service/Altinn.Notifications.Sms.slnx"},'
          fi

          if [[ "${{ steps.filter.outputs.tools }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix+='{"component":"tools","solution":"tools/Altinn.Notifications.Tools.slnx"},'
          fi

          # Remove trailing comma and close JSON
          matrix="${matrix%,}]}"

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix: $matrix"
      - name: Summary of detected changes
        run: |
          echo "### Detected Changes" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ steps.filter.outputs.api }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shared | ${{ steps.filter.outputs.shared }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SMS | ${{ steps.filter.outputs.sms }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Email | ${{ steps.filter.outputs.email }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tools | ${{ steps.filter.outputs.tools }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Matrix:** \`${{ steps.set-matrix.outputs.matrix }}\`" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build solution
    needs: changes
    if: needs.changes.outputs.matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-
      - name: Build solution
        run: dotnet build ${{ matrix.solution }} -c Release -v q
          
  test-api:
    name: "Test: Notifications API"
    needs: [changes, build]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    services:
      postgres:
        image: postgres:18.3@sha256:52e6ffd11fddd081ae63880b635b2a61c14008c17fc98cdc7ce5472265516dd0
        env:
          POSTGRES_USER: platform_notifications_admin
          POSTGRES_PASSWORD: Password
          POSTGRES_DB: notificationsdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      kafka:
        image: confluentinc/cp-kafka:8.2.0@sha256:acbbf674f2ed40e5d0a8ca51beb0f00692c866fc22b5ce06f8cadbdc54cd4436
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.0.x
      - name: Setup PostgreSQL
        run: |
          chmod +x tools/dev-setup/dbsetup.sh
          ./tools/dev-setup/dbsetup.sh
      - name: Restart database to enable config changes
        run: docker restart ${{ job.services.postgres.id }}
      - name: Increase inotify watchers
        run: sudo sysctl -w fs.inotify.max_user_instances=524288
      - name: Run API unit tests
        run: |
          dotnet test components/api/test/Altinn.Notifications.Tests/Altinn.Notifications.Tests.csproj \
          -v q \
          --collect:"XPlat Code Coverage" \
          --results-directory TestResults/api-unit/ \
          --logger "trx;LogFileName=api-unit.trx" \
          --configuration Release \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Run API integration tests
        run: |
          dotnet test components/api/test/Altinn.Notifications.IntegrationTests/Altinn.Notifications.IntegrationTests.csproj \
          -v q \
          --collect:"XPlat Code Coverage" \
          --results-directory TestResults/api-integration/ \
          --logger "trx;LogFileName=api-integration.trx" \
          --configuration Release \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Run API ASB integration tests
        run: |
          dotnet test components/api/test/Altinn.Notifications.IntegrationTestsASB/Altinn.Notifications.IntegrationTestsASB.csproj \
          -v q \
          --collect:"XPlat Code Coverage" \
          --results-directory TestResults/api-integration-asb/ \
          --logger "trx;LogFileName=api-integration-asb.trx" \
          --configuration Release \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: test-results-api
          path: TestResults/
      - name: Verify coverage files exist
        if: always()
        run: |
          if ! find TestResults -name "coverage.opencover.xml" | grep -q .; then
            echo "❌ ERROR: No coverage files produced!"
            echo "This usually means coverlet.collector is missing or coverage collection failed."
            exit 1
          fi
          echo "✅ Coverage files found:"
          find TestResults -name "coverage.opencover.xml" -exec echo "  {}" \;
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-api
          path: '**/TestResults/**/coverage.opencover.xml'
      - name: Process test results
        if: always()
        uses: NasAmin/trx-parser@359b39f5319df4478443ef1f0eb952f159896995 # v0.7.0
        with:
          TRX_PATH: ${{ github.workspace }}/TestResults
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  test-shared:
