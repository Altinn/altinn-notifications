name: Label critical PR
on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
    paths:
      - '**/Altinn.Notifications.Core/**'
      - '**/Altinn.Notifications.Sms.Core/**'
      - '**/Altinn.Notifications.Email.Core/**'

jobs:
  add_labels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
