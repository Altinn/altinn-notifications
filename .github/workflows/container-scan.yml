name: Notifications scan

on:
  push:
    branches: [main]
    paths:
      - 'components/*/src/**'
      - 'components/*/Dockerfile'
      - '.trivyignore.yaml'
      - '.github/workflows/container-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'components/*/src/**'
      - 'components/*/Dockerfile'
      - '.trivyignore.yaml'
      - '.github/workflows/container-scan.yml'
  schedule:
    - cron: '0 8 * * 1,4'

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      sms: ${{ steps.filter.outputs.sms }}
      email: ${{ steps.filter.outputs.email }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            api:
              - 'components/api/src/**'
              - 'components/api/Dockerfile'
              - 'components/shared/src/**'
              - '.trivyignore.yaml'
              - '.github/workflows/container-scan.yml'
            sms:
              - 'components/shared/src/**'
              - 'components/sms-service/src/**'
              - 'components/sms-service/Dockerfile'
              - '.trivyignore.yaml'
              - '.github/workflows/container-scan.yml'
            email:
              - 'components/shared/src/**'
              - 'components/email-service/src/**'
              - 'components/email-service/Dockerfile'
              - '.trivyignore.yaml'
              - '.github/workflows/container-scan.yml'

  scan-api:
    name: 'Scan: Notifications API'
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the Docker image
        run: docker build . -f components/api/Dockerfile --tag altinn-notifications-api:${{ github.sha }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'altinn-notifications-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,aquasec/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
          TRIVY_SHOW_SUPPRESSED: true

  scan-email:
    name: 'Scan: Email Delivery Service'
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.email == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the Docker image
        run: docker build . -f components/email-service/Dockerfile --tag altinn-notifications-email:${{ github.sha }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'altinn-notifications-email:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,aquasec/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
          TRIVY_SHOW_SUPPRESSED: true

  scan-sms:
    name: 'Scan: SMS Delivery Service'
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.sms == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the Docker image
        run: docker build . -f components/sms-service/Dockerfile --tag altinn-notifications-sms:${{ github.sha }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'altinn-notifications-sms:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,aquasec/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
          TRIVY_SHOW_SUPPRESSED: true
