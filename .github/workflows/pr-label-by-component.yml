name: Label PR by component
on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'components/api/**'
      - 'components/email-service/**'
      - 'components/sms-service/**'
      - 'components/shared/**'
      - 'tools/**'

jobs:
  add_component_labels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
