name: Label PR by component
on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'components/api/**'
      - 'components/email-service/**'
      - 'components/sms-service/**'
      - 'components/shared/**'

jobs:
  add_component_labels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
